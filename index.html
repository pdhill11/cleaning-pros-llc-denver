<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denver's Premium Commercial & Residential Cleaning Services | Cleaning Pros LLC</title>
  <meta name="description" content="Cleaning Pros LLC provides premium, reliable residential and commercial cleaning across the Greater Denver Area. Available 24/7, owner-operated, and ASL-proficient. Get a free quote today!">
  
  <!-- Typography & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Premium Vanilla CSS -->
  <style>
    :root {
      /* HSL Color System */
      --h-primary: 172;
      --s-primary: 84%;
      --l-primary: 35%; /* #0D9488 teal/emerald base */
      
      --c-primary: HSL(var(--h-primary), var(--s-primary), var(--l-primary));
      --c-primary-light: HSL(var(--h-primary), var(--s-primary), 95%);
      --c-primary-dark: HSL(var(--h-primary), var(--s-primary), 24%);
      --c-primary-glow: rgba(13, 148, 136, 0.15);
      
      --c-dark: #1A1A2E; /* Deep Charcoal */
      --c-dark-glow: rgba(26, 26, 46, 0.05);
      --c-body: #4B5563; /* Readable slate/grey body text */
      --c-muted: #6B7280; /* Medium grey body copy */
      --c-border: #E5E7EB; /* Light grey border */
      --c-bg: #FAFAFA; /* Off-white base */
      --c-white: #FFFFFF;
      
      /* Shadows */
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 4px 20px -2px rgba(26, 26, 46, 0.06), 0 2px 6px -1px rgba(26, 26, 46, 0.03);
      --shadow-lg: 0 20px 40px -10px rgba(26, 26, 46, 0.1), 0 4px 12px -2px rgba(26, 26, 46, 0.04);
      --shadow-premium: 0 30px 60px -20px rgba(13, 148, 136, 0.12), 0 0 0 1px rgba(13, 148, 136, 0.05);
      --shadow-inset: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);

      /* Border Radii */
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 24px;
      --radius-full: 9999px;
      
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --transition-smooth: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    
    body {
      font-family: var(--font-sans);
      color: var(--c-body);
      background: var(--c-bg);
      overflow-x: hidden;
      line-height: 1.6;
    }
    
    a {
      color: inherit;
      text-decoration: none;
      transition: var(--transition-smooth);
    }
    
    button, input, select, textarea {
      font-family: inherit;
      font-size: inherit;
      outline: none;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 100px 0;
      position: relative;
    }

    .section-alt {
      background-color: var(--c-white);
    }

    /* Typography Utilities */
    h1, h2, h3, h4 {
      color: var(--c-dark);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--c-primary);
      background: var(--c-primary-light);
      padding: 6px 16px;
      border-radius: var(--radius-full);
      margin-bottom: 20px;
    }

    .lead {
      font-size: 18px;
      color: var(--c-muted);
      max-width: 650px;
      margin: 0 auto;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: var(--radius-full);
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition-smooth);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--c-primary);
      color: var(--c-white);
      box-shadow: 0 10px 20px -5px var(--c-primary-glow);
    }
    .btn-primary:hover {
      background: var(--c-primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -4px rgba(13, 148, 136, 0.3);
    }

    .btn-secondary {
      background: var(--c-white);
      color: var(--c-dark);
      border: 1px solid var(--c-border);
      box-shadow: var(--shadow-sm);
    }
    .btn-secondary:hover {
      background: var(--c-bg);
      border-color: var(--c-muted);
      transform: translateY(-2px);
    }

    /* ── SCROLL ANIMATIONS ── */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .animate-on-scroll.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    /* Header Nav */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(250, 250, 250, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.5);
      transition: var(--transition-smooth);
    }
    header.scrolled {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow-md);
      border-bottom-color: transparent;
    }
    header .container {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 900;
      color: var(--c-dark);
      letter-spacing: -0.03em;
    }
    .logo span.highlight {
      color: var(--c-primary);
    }
    .nav-menu {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-link {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-body);
      position: relative;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--c-primary);
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--c-primary);
      transition: var(--transition-smooth);
    }
    .nav-link:hover::after, .nav-link.active::after {
      width: 100%;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-phone {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      color: var(--c-dark);
    }
    .nav-phone:hover {
      color: var(--c-primary);
    }

    /* Mobile Hamburger Menu */
    .menu-toggle {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 22px;
      height: 16px;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 1100;
    }
    .menu-toggle span {
      display: block;
      width: 100%;
      height: 2px;
      background-color: var(--c-dark);
      border-radius: 2px;
      transition: var(--transition-smooth);
    }
    .menu-toggle.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .menu-toggle.open span:nth-child(2) {
      opacity: 0;
    }
    .menu-toggle.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .mobile-nav {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100vh;
      background: var(--c-white);
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 40px;
      box-shadow: var(--shadow-lg);
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .mobile-nav.open {
      right: 0;
    }
    .mobile-nav .nav-link {
      font-size: 20px;
      font-weight: 700;
    }

    /* Hero Section */
    #hero {
      padding-top: 150px;
      padding-bottom: 80px;
      background: linear-gradient(135deg, #F3FBF9 0%, #FAFAFA 100%);
      overflow: hidden;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .hero-content {
      text-align: left;
    }
    .hero-title {
      font-size: clamp(38px, 4.5vw, 60px);
      line-height: 1.08;
      margin-bottom: 24px;
    }
    .hero-title span.text-gradient {
      background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-desc {
      font-size: 18px;
      color: var(--c-muted);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .hero-btns {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    .hero-trust-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--c-white);
      padding: 8px 16px;
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--c-border);
      font-size: 13px;
      font-weight: 600;
      color: var(--c-dark);
    }
    .hero-trust-stars {
      color: #FBBF24;
      display: inline-flex;
      gap: 2px;
    }

    .hero-visual {
      position: relative;
    }
    .hero-img-wrap {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      aspect-ratio: 4/3;
      position: relative;
    }
    .hero-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 1.5s var(--transition-smooth);
    }
    .hero-img-wrap:hover img {
      transform: scale(1.05);
    }
    .hero-glass-card {
      position: absolute;
      bottom: -20px;
      left: -20px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 24px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.6);
      max-width: 280px;
    }
    .hero-glass-text {
      font-size: 13px;
      color: var(--c-dark);
      font-weight: 600;
      line-height: 1.5;
    }

    /* Trust Signals Strip */
    .trust-strip {
      background: var(--c-white);
      border-top: 1px solid var(--c-border);
      border-bottom: 1px solid var(--c-border);
      padding: 24px 0;
    }
    .trust-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }
    .trust-card {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--c-dark);
    }
    .trust-card svg {
      color: var(--c-primary);
    }

    /* Services Grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-top: 50px;
    }
    .service-card {
      background: var(--c-white);
      border: 1px solid rgba(13, 148, 136, 0.04);
      border-radius: var(--radius-md);
      padding: 40px 32px;
      box-shadow: var(--shadow-md);
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-premium);
      border-color: rgba(13, 148, 136, 0.2);
    }
    .service-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      background: var(--c-primary-light);
      color: var(--c-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      transition: var(--transition-smooth);
    }
    .service-card:hover .service-icon-wrap {
      background: var(--c-primary);
      color: var(--c-white);
      transform: rotate(6deg);
    }
    .service-card h3 {
      font-size: 20px;
      margin-bottom: 14px;
    }
    .service-card p {
      font-size: 15px;
      color: var(--c-muted);
      line-height: 1.6;
      flex-grow: 1;
    }
    .service-action {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 14px;
      color: var(--c-primary);
    }
    .service-action svg {
      transition: transform 0.2s ease;
    }
    .service-card:hover .service-action svg {
      transform: translateX(4px);
    }

    /* Calculator Section */
    #calculator {
      background: linear-gradient(180deg, #FAFAFA 0%, #F0FAF7 100%);
    }
    .calc-container {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 50px;
      margin-top: 50px;
      align-items: start;
    }
    .calc-form-box {
      background: var(--c-white);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(229, 231, 235, 0.6);
    }
    .calc-field-group {
      margin-bottom: 30px;
    }
    .calc-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--c-dark);
      margin-bottom: 12px;
    }
    .calc-label span.value-highlight {
      color: var(--c-primary);
      font-size: 18px;
      font-weight: 800;
    }
    
    /* Segmented Control Button Toggle */
    .segmented-control {
      display: flex;
      background: var(--c-bg);
      padding: 6px;
      border-radius: var(--radius-full);
      border: 1px solid var(--c-border);
    }
    .segment-btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 700;
      color: var(--c-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      text-align: center;
    }
    .segment-btn.active {
      background: var(--c-white);
      color: var(--c-primary);
      box-shadow: var(--shadow-sm);
    }

    /* Sqft Slider & Input Row */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .slider-row input[type="range"] {
      flex-grow: 1;
      accent-color: var(--c-primary);
      height: 6px;
      border-radius: var(--radius-full);
      cursor: pointer;
    }
    .slider-number-input {
      width: 100px;
      padding: 10px 14px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius-sm);
      font-weight: 700;
      color: var(--c-dark);
      text-align: center;
      transition: var(--transition-smooth);
    }
    .slider-number-input:focus {
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px var(--c-primary-glow);
    }

    /* Calculator Results Card */
    .calc-result-card {
      background: var(--c-dark);
      color: var(--c-white);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: 100px;
    }
    .calc-result-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 24px;
      margin-bottom: 24px;
    }
    .calc-result-title {
      color: var(--c-white);
      font-size: 22px;
      margin-bottom: 8px;
    }
    .calc-result-desc {
      color: #9CA3AF;
      font-size: 14px;
    }
    .calc-math-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #D1D5DB;
      margin-bottom: 12px;
    }
    .calc-math-discount {
      color: #34D399; /* emerald green */
      font-weight: 600;
    }
    .calc-price-wrap {
      margin: 32px 0;
      text-align: center;
    }
    .calc-price-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9CA3AF;
      margin-bottom: 4px;
    }
    .calc-final-price {
      font-size: 48px;
      font-weight: 900;
      color: var(--c-white);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .calc-final-price span.frequency-tag {
      font-size: 16px;
      font-weight: 500;
      color: #9CA3AF;
      margin-left: 4px;
    }

    /* About Section layout */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 70px;
      align-items: center;
    }
    .about-story {
      text-align: left;
    }
    .cities-served-wrap {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--c-border);
    }
    .cities-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--c-dark);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cities-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .city-tag {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      color: var(--c-body);
    }

    .about-signals-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .about-signal-card {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition-smooth);
    }
    .about-signal-card:hover {
      background: var(--c-white);
      border-color: var(--c-primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .about-signal-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--c-primary-light);
      color: var(--c-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .about-signal-card span {
      font-size: 15px;
      font-weight: 700;
      color: var(--c-dark);
    }

    /* Reviews Grid */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-top: 50px;
    }
    .review-card {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 36px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
      position: relative;
    }
    .review-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }
    .review-stars {
      color: #FBBF24;
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }
    .review-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--c-body);
      font-style: italic;
      margin-bottom: 24px;
    }
    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--c-primary-light);
      color: var(--c-primary);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .review-author-info h4 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .review-author-info p {
      font-size: 12px;
      color: var(--c-muted);
      font-weight: 600;
    }

    /* FAQ Section Accordion */
    .faq-list {
      max-width: 800px;
      margin: 50px auto 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .faq-item {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition-smooth);
    }
    .faq-item:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--c-primary);
    }
    .faq-question-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .faq-question-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--c-dark);
    }
    .faq-icon-wrap {
      color: var(--c-primary);
      transition: transform 0.3s ease;
    }
    .faq-item.open .faq-icon-wrap {
      transform: rotate(45deg);
    }
    .faq-answer {
      max-height: 0;
      overflow: hidden;

    /* ── DYNAMIC LUCIDE ICON COMPONENT ── */
    function Icon({ name, className = '', size = 20, strokeWidth = 2, ...props }) {
      const normalizedName = name
        .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
        .toLowerCase();
      
      const iconData = window.lucide?.icons[name] || 
                       window.lucide?.icons[normalizedName] || 
                       window.lucide?.icons[name.toLowerCase()] ||
                       window.lucide?.[name] ||
                       window.lucide?.[normalizedName];
      
      if (!iconData || !Array.isArray(iconData)) {
        return (
          <svg
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth={strokeWidth}
            strokeLinecap="round"
            strokeLinejoin="round"
            className={className}
            {...props}
          />
        );
      }

      const combinedAttrs = {
        xmlns: 'http://www.w3.org/2000/svg',
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: props.stroke || "currentColor",
        strokeWidth,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        width: size,
        height: size,
        className,
        ...props
      };

      const childrenElements = iconData.map((child, i) => {
        const [childTag, childAttrs] = child;
        return React.createElement(childTag, { key: i, ...childAttrs });
      });

      return React.createElement('svg', combinedAttrs, childrenElements);
    }

    /* ── MAIN ROOT APPLICATION ── */
    function App() {
      const [activeSection, setActiveSection] = React.useState('hero');
      const [bookingInfo, setBookingInfo] = React.useState(null);

      // Dynamic LocalBusiness JSON-LD injection for Local SEO
      React.useEffect(() => {
        let script = document.getElementById('local-business-jsonld');
        if (!script) {
          script = document.createElement('script');
          script.id = 'local-business-jsonld';
          script.type = 'application/ld+json';
          document.head.appendChild(script);
        }
        
        // Parse address parts
        const addr = CONFIG.contact.address;
        const parts = addr.split(',');
        const street = parts[0]?.trim() || '';
        const city = parts[1]?.trim() || '';
        const regionZip = parts[2]?.trim() || '';
        const region = regionZip.split(' ')[0] || 'CO';
        const zip = regionZip.split(' ')[1] || '80219';

        const structuredData = {
          "@context": "https://schema.org",
          "@type": "LocalBusiness",
          "name": CONFIG.brand.name,
          "image": IMAGES.hero,
          "telephone": CONFIG.contact.phone,
          "email": CONFIG.contact.email,
          "address": {
            "@type": "PostalAddress",
            "streetAddress": street,
            "addressLocality": city,
            "addressRegion": region,
            "postalCode": zip,
            "addressCountry": "US"
          },
          "url": window.location.href,
          "priceRange": "$$",
          "areaServed": CONFIG.seo.citiesServed
        };
        
        script.text = JSON.stringify(structuredData);

        return () => {
          const scriptToRemove = document.getElementById('local-business-jsonld');
          if (scriptToRemove) {
            scriptToRemove.remove();
          }
        };
      }, []);

      // Scroll observer to update active navigation links
      React.useEffect(() => {
        const sections = ['hero', 'services', 'calculator', 'about', 'reviews', 'faq', 'contact'];
        const observers = sections.map(sec => {
          const el = document.getElementById(sec);
          if (!el) return null;
          
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) {
              setActiveSection(sec);
            }
          }, { threshold: 0.25 });
          
          observer.observe(el);
          return { observer, el };
        }).filter(Boolean);

        // General scroll animate-on-scroll trigger
        const animObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('in-view');
              animObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-on-scroll').forEach(el => {
          animObserver.observe(el);
        });

        return () => {
          observers.forEach(({ observer, el }) => observer.unobserve(el));
          animObserver.disconnect();
        };
      }, []);

      const handleBookFromCalc = (info) => {
        setBookingInfo(info);
        const contactSection = document.getElementById('contact');
        if (contactSection) {
          const offset = 76;
          const bodyRect = document.body.getBoundingClientRect().top;
          const elementRect = contactSection.getBoundingClientRect().top;
          const elementPosition = elementRect - bodyRect;
          const offsetPosition = elementPosition - offset;
          
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        }
      };

      const handleNavigateToCalc = () => {
        const calcSection = document.getElementById('calculator');
        if (calcSection) {
          const offset = 76;
          const bodyRect = document.body.getBoundingClientRect().top;
          const elementRect = calcSection.getBoundingClientRect().top;
          const elementPosition = elementRect - bodyRect;
          const offsetPosition = elementPosition - offset;
          
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        }
      };

      const handleServiceSelect = (serviceTitle) => {
        setBookingInfo({
          isCommercial: serviceTitle.toLowerCase().includes('commercial') || serviceTitle.toLowerCase().includes('janitorial'),
          sqft: 2000,
          frequency: 'biweekly',
          totalCost: 0,
          preselectedService: serviceTitle
        });
        const contactSection = document.getElementById('contact');
        if (contactSection) {
          const offset = 76;
          const bodyRect = document.body.getBoundingClientRect().top;
          const elementRect = contactSection.getBoundingClientRect().top;
          const elementPosition = elementRect - bodyRect;
          const offsetPosition = elementPosition - offset;
          
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        }
      };

      return (
        <React.Fragment>
          <Navigation activeSection={activeSection} onNavigate={setActiveSection} />
          <Hero onNavigateToCalc={handleNavigateToCalc} />
          <TrustStrip />
          <Services onSelectService={handleServiceSelect} />
          <PricingCalculator onBook={handleBookFromCalc} />
          <About />
          <Reviews />
          <Faq />
          <ContactForm bookingInfo={bookingInfo} />
          <Footer />
        </React.Fragment>
      );
    }

    // Mount to root DOM node
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
